<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Experience</title>
    <style>
        :root {
            --primary: #6366f1;
            --whatsapp: #22c55e;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .player-card {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h2 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.9);
        }

        .section { margin-bottom: 30px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        button:hover {
            background: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
            border-color: transparent;
        }

        button.wa-btn:hover {
            background: var(--whatsapp);
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4);
        }

        .now-playing-container {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px inset rgba(255, 255, 255, 0.05);
        }

        #track-name {
            display: block;
            margin-bottom: 15px;
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 500;
        }

        audio {
            width: 100%;
            height: 40px;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5);
        }

        /* Animación de pulso para cuando suena */
        .playing {
            border-color: var(--primary) !important;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }
    </style>
</head>
<body>

<div class="player-card">
    <div class="section">
        <h2>🎵 Mi Playlist</h2>
        <div class="grid">
            <button onclick="playAudio('cancion1.mp3', this)">Track 01</button>
            <button onclick="playAudio('cancion2.mp3', this)">Track 02</button>
            <button onclick="playAudio('cancion3.mp3', this)">Track 03</button>
            <button onclick="playAudio('cancion4.mp3', this)">Track 04</button>
            <button onclick="playAudio('cancion5.mp3', this)">Track 05</button>
            <button onclick="playAudio('cancion6.mp3', this)">Track 06</button>
            <button onclick="playAudio('cancion7.mp3', this)">Track 07</button>
            <button onclick="playAudio('cancion8.mp3', this)">Track 08</button>
            <button onclick="playAudio('cancion9.mp3', this)">Track 09</button>
            <button onclick="playAudio('cancion10.mp3', this)">Track 10</button>
        </div>
    </div>

    <div class="section">
        <h2>🎤 Mensajes de Voz</h2>
        <div class="grid">
            <button class="wa-btn" onclick="playAudio('wa1.mp3', this)">Audio WA 1</button>
            <button class="wa-btn" onclick="playAudio('wa2.mp3', this)">Audio WA 2</button>
            <button class="wa-btn" onclick="playAudio('wa3.mp3', this)">Audio WA 3</button>
        </div>
    </div>

    <div class="now-playing-container">
        <span id="track-name">SIN REPRODUCIR</span>
        <audio id="main-player" controls></audio>
    </div>
</div>

<script>
    const player = document.getElementById('main-player');
    const trackName = document.getElementById('track-name');

    function playAudio(file, btn) {
        // Quitar clase 'playing' de todos los botones
        document.querySelectorAll('button').forEach(b => b.classList.remove('playing'));
        
        // Configurar y reproducir
        player.src = file;
        player.play();
        
        // Visuals
        btn.classList.add('playing');
        trackName.innerText = "REPRODUCIENDO: " + file.toUpperCase();
    }
</script>

</body>
</html>
