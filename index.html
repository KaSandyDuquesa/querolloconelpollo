<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Audio Exacto</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --primary: #bb86fc;
            --wa: #03dac6;
            --text: #ffffff;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            width: 90%;
            max-width: 600px;
            background: var(--card);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 { font-size: 1.2rem; color: var(--primary); border-bottom: 1px solid #333; padding-bottom: 10px; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }
        button {
            background: #2c2c2c;
            border: 1px solid #444;
            color: white;
            padding: 15px 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
            text-align: center;
        }
        button:hover { background: var(--primary); color: #000; }
        button:active { transform: scale(0.95); }
        .wa-btn { border-color: var(--wa); color: var(--wa); }
        .wa-btn:hover { background: var(--wa); color: #000; }
        
        .player-fixed {
            background: #252525;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        #current-track { margin-bottom: 10px; font-weight: bold; font-size: 0.9rem; display: block; color: #aaa; }
        audio { width: 100%; filter: invert(100%); }
    </style>
</head>
<body>

<div class="container">
    <h2>🎤 PETICIONES (WHATSAPP)</h2>
    <div class="grid">
        <!-- Nombres exactos de la imagen image_57e15e.png -->
        <button class="wa-btn" onclick="reproducir('PETICION POWER RANGER.mp3')">PETICION POWER RANGER</button>
        <button class="wa-btn" onclick="reproducir('PETICION BUNKERS.mp3')">PETICION BUNKERS</button>
        <button class="wa-btn" onclick="reproducir('PETICION GOKU.mp3')">PETICION GOKU</button>
    </div>

    <h2>🎵 CANCIONES Y PROGRAMA</h2>
    <div class="grid">
        <!-- Nombres exactos de la imagen image_583bcf.png -->
        <button onclick="reproducir('CIERRE PROGRAMA.mp3')">CIERRE PROGRAMA</button>
        <button onclick="reproducir('CAIFANES VIENTO.mp3')">CAIFANES VIENTO</button>
        <button onclick="reproducir('CUENTO CAPERUCITA.mp3')">CUENTO CAPERUCITA</button>
        <button onclick="reproducir('ANUNCIO COCINA.mp3')">ANUNCIO COCINA</button>
        <button onclick="reproducir('CANCION LOS BUNKERS.mp3')">CANCION LOS BUNKERS</button>
        <button onclick="reproducir('CUENTO 2.mp3')">CUENTO 2</button>
        <button onclick="reproducir('ANUNCIO ESCUELA.mp3')">ANUNCIO ESCUELA</button>
        <button onclick="reproducir('CANCION TIROTEO.mp3')">CANCION TIROTEO</button>
        <button onclick="reproducir('TERROR.mp3')">TERROR</button>
        <button onclick="reproducir('INICIO PROGRAMA.mp3')">INICIO PROGRAMA</button>
    </div>

    <div class="player-fixed">
        <span id="current-track">Ningún audio seleccionado</span>
        <audio id="player" controls></audio>
    </div>
</div>

<script>
    const player = document.getElementById('player');
    const trackText = document.getElementById('current-track');

    function reproducir(nombreArchivo) {
        // Detiene el audio actual antes de empezar el nuevo
        player.pause();
        player.src = nombreArchivo;
        player.play();
        
        // Actualiza el texto en pantalla
        trackText.innerText = "Reproduciendo: " + nombreArchivo;
    }
</script>

</body>
</html>
